repos:
  - repo: local
    hooks:
      - id: update-treemap
        name: Actualizar estructura del proyecto
        entry: .venv/Scripts/python.exe agent_tools/treemap.py
        language: system
        pass_filenames: false
        always_run: true
      
      - id: update-dependencies
        name: Actualizar análisis de dependencias
        entry: cmd /c ".venv\Scripts\python.exe agent_tools\analyze_dependencies.py && git add agent\dependencies_report.md"
        language: system
        pass_filenames: false
        always_run: true